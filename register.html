{% extends "base.html" %}
{% set title = "Registrieren" %}
{% block content %}
<div class="auth-page">
  <section class="auth-card">
    <div class="badge">NovaStream Register</div>
    <h1>Konto erstellen</h1>

    <form id="registerForm" class="stack">
      <label><span>Name</span><input type="text" name="full_name" required></label>
      <label><span>E-Mail</span><input type="email" name="email" required></label>
      <label>
        <span>Paket</span>
        <select name="package_name">
          <option>Basic</option>
          <option selected>Premium</option>
          <option>Ultra</option>
        </select>
      </label>
      <label><span>Passwort</span><input type="password" name="password" required></label>
      <button class="btn" type="submit">Registrieren</button>
    </form>
    <p id="message" class="message"></p>
    <p class="muted small"><a href="{{ url_for('home') }}">Zur Startseite</a> · <a href="{{ url_for('login_page') }}">Zum Login</a></p>
  </section>
</div>
<script>
document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const form = e.currentTarget;
  const response = await fetch("/api/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      full_name: form.full_name.value,
      email: form.email.value,
      package_name: form.package_name.value,
      password: form.password.value
    })
  });
  const data = await response.json();
  const message = document.getElementById("message");
  message.textContent = data.message || "";
  message.className = "message " + (data.ok ? "success" : "error");
  if (data.ok) form.reset();
});
</script>
{% endblock %}
